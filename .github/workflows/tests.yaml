name: Unit and integration tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Configure environment
        run: |
          echo "::group::Begin snap install"
          sudo snap install shellcheck
          echo "::endgroup::"
      - name: Install dependencies by uv
        run: |
          uv venv --system-site-packages
          uv sync
      - name: Run codespell
        run: make test-codespell
      - name: Run ruff format
        run: make test-ruff-format
      - name: Run ruff
        run: make test-ruff
      - name: Run my-py
        run: make test-mypy
      - name: Run pyright
        run: make test-pyright
      - name: Run shellcheck
        run: make test-shellcheck
      - name: Run yamllint
        run: make test-yamllint
  tests:
    strategy:
      matrix:
        platform: [ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Configure environment
        run: |
          echo "::group::apt-get update"
          sudo apt-get update
          echo "::endgroup::"
          echo "::group::apt-get install..."
          sudo apt-get install -y python3 python3-pip python3-apt python3-dev libapt-pkg-dev
          echo "::endgroup::"
      - name: Install dependencies by uv
        run: |
          uv venv --system-site-packages
          uv sync
      - name: Run unit tests
        run: |
          make test-units
      - name: Run integration tests
        run: |
          make test-integrations
