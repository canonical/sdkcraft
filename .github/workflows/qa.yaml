name: QA
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    uses: canonical/starflow/.github/workflows/lint-python.yaml@main
  test:
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    with:
      fast-test-platforms: '["self-hosted-linux-amd64-jammy-medium", "self-hosted-linux-amd64-noble-large"]'
      fast-test-python-versions: '["3.10", "3.12"]'
      slow-test-platforms: '["self-hosted-linux-amd64-jammy-medium", "self-hosted-linux-amd64-noble-large"]'
      slow-test-python-versions: '["3.10"]'
      lowest-python-platform: self-hosted-linux-amd64-jammy-medium
      lowest-python-version: "3.10"
