name: End to end tests
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:

env:
  SNAPCRAFT_BUILD_ENVIRONMENT: lxd

# Cancel currently-running builds when pushing new commits to a PR or branch
# https://stackoverflow.com/a/72408109
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  snap-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: snapcore/action-build@v1
        id: snapcraft

      - name: Upload snap artifact
        uses: actions/upload-artifact@v3
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}

  snap-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, ubuntu-20.04]
    runs-on: [self-hosted, Linux, jammy, X64, xlarge]
    needs: [snap-build]
    steps:
      - name: Cleanup job workspace
        run: |
          rm -rf "${{ github.workspace }}"
          mkdir "${{ github.workspace }}"
      - name: Setup
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
      - name: Install LXD
        uses: canonical/setup-lxd@main
        with:
          channel: 5.21/stable
      - name: Checkout Workshop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Install spread
        run: |
          # go install is not supported for forks...
          git clone https://github.com/dmitry-lyfar/spread
          pushd spread
          go install ./...
          popd
      - name: Download snap artifact
        uses: actions/download-artifact@v3
        with:
          name: snap
          path: tests
      - name: Run spread
        run: spread $SNAPCRAFT_BUILD_ENVIRONMENT:${{matrix.os}}:tests/spread/
