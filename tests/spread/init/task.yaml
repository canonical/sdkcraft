summary: SDKcraft init test

restore: |
  run_sdkcraft clean || true

execute: |
  run_sdkcraft init
  test -f sdk.yaml
  run_sdkcraft pack

  test -f my-sdk-name.sdk
  test ! -d parts -a ! -d stage -a ! -d prime

  rm my-sdk-name.sdk
  run_sdkcraft
  test -f my-sdk-name.sdk
  test ! -d parts -a ! -d stage -a ! -d prime
