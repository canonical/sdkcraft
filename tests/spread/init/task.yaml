summary: SDKcraft init test

restore: |
  run_sdkcraft clean || true

execute: |
  arch="$(dpkg --print-architecture)"

  rm -rf my-sdk-name
  mkdir my-sdk-name
  cd my-sdk-name

  run_sdkcraft init
  test -f sdkcraft.yaml

  run_sdkcraft pack
  test -f "my-sdk-name_${arch}_ubuntu@22.04.sdk"
  test ! -d parts -a ! -d stage -a ! -d prime
