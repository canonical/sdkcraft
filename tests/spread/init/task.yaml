summary: SDKcraft init test

restore: |
  run_sdkcraft clean || true

execute: |
  arch="$(dpkg --print-architecture)"

  rm -rf my-sdk-name
  mkdir my-sdk-name
  cd my-sdk-name

  run_sdkcraft init

  diff -u ../sources <(find . -type f -printf '%P\n' | sort)

  run_sdkcraft pack

  diff -u ../packed <(tar -tf "my-sdk-name_${arch}_ubuntu@22.04.sdk" | sort)
  test ! -d parts -a ! -d stage -a ! -d prime
