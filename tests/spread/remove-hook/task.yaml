summary: snap remove hook test

# Run this test last, as it removes the base instances that other tests can use
priority: -100

execute: |
  sdkcraft init

  # `sdkcraft pull` is enough to create an instance, no need to execute the
  # entire lifecycle
  sdkcraft pull

  # verify the lxd project and an instance were created
  if [[ -z "$(lxc list --project sdkcraft --format=csv --columns=n)" ]]; then
    echo "could not find lxd project or instances"
    exit 1
  fi

  # remove sdkcraft
  snap remove sdkcraft

  # verify instances were deleted
  if [[ -n "$(lxc list --project sdkcraft --format=csv --columns=n)" ]]; then
    echo "instances were not removed"

    # show snap log
    snap tasks --last=remove
    exit 1
  fi

  # verify images were deleted
  if [[ -n "$(lxc image list --project sdkcraft --format=csv --columns=f)" ]]; then
    echo "images were not removed"

    # show snap log
    snap tasks --last=remove
    exit 1
  fi

  # verify project was removed
  if lxc project show sdkcraft &> /dev/null; then
    echo "project was not removed"

    # show snap log
    snap tasks --last=remove
    exit 1
  fi

restore: |
  # reinstall sdkcraft so subsequent tests on the same runner are unaffected
  install_sdkcraft
