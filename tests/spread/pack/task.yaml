summary: SDKcraft pack test

execute: |
  # Create an SDK with hooks
  run_sdkcraft init
  test -f sdk.yaml
  mkdir hooks
  touch hooks/{setup-base,check-health,utils.sh}

  # test packing outside of the sdk directory
  run_sdkcraft pack
  test -f my-sdk-name.sdk
  test ! -d parts -a ! -d stage -a ! -d prime

  diff -u expected <(tar -tf my-sdk-name.sdk | sort)
