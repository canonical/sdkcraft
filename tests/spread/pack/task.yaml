summary: sdkcraft pack test

execute: |

  # Create an SDK with hooks
  run_sdkcraft init
  test -f sdk/sdkcraft.yaml
  mkdir -p sdk/hooks
  hooks=("setup-base" "save-state" "restore-state" "unknown-hook")
  for hook in "${hooks[@]}"; do
      touch "sdk/hooks/$hook"
  done

  run_sdkcraft pack

  test -f my-sdk-name.sdk
  test ! -d parts -a ! -d stage -a ! -d prime

  # test that the resulting archive contains only supported hooks
  expected_hooks=("${files[@]/unknown-hook}")
  for file in "${expected_hooks[@]}"; do
    test "$(tar -tf my-sdk-name.sdk | grep "hooks/$file")"
  done
  test "$(tar -tf my-sdk-name.sdk -C "hooks/" --exclude "${expected_hooks[@]}" | wc -l)" -eq 0
