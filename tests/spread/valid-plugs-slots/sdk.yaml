name: my-sdk-name
base: ubuntu@22.04
version: "0.1"
summary: Single-line elevator pitch for your amazing SDK
description: |
  This is my my-sdk-name's description. You have a paragraph or two to tell the
  most important story about it. Keep it under 100 words though,
  we live in tweetspace.
license: GPL-3.0
platforms:
  amd64:

plugs:
  test:
    interface: mount
    workshop-target: /data
  gpu:
  desktop:
    interface: desktop
  postgres:
    interface: tunnel
    endpoint: 5432
slots:
  test:
    interface: mount
    workshop-source: /data
  http:
    interface: tunnel
    endpoint: localhost:8080/tcp
