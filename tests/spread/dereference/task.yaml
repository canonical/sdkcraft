summary: SDKcraft tar dereference test

restore: |
  run_sdkcraft clean || true

execute: |
  arch="$(dpkg --print-architecture)"

  run_sdkcraft pack
  test -f "my-sdk-name_${arch}_ubuntu@22.04.sdk"
  tar xf "my-sdk-name_${arch}_ubuntu@22.04.sdk"
  [ "$(stat --format=%i filea)" = "$(stat --format=%i fileb)" ]
