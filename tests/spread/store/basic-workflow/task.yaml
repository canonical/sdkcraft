summary: Test the store workflow to register, upload, and release an SDK

environment:
  SDKCRAFT_STORE_CREDENTIALS: "$(HOST: echo ${SDKCRAFT_STORE_CREDENTIALS_PROD})"

prepare: |
  if [[ -z "$SDKCRAFT_STORE_CREDENTIALS" ]]; then
    echo "No credentials set in env SDKCRAFT_STORE_CREDENTIALS"
    exit 1
  fi

restore: |
  run_sdkcraft clean || true
  rm -f ./*.sdk

execute: |
  #shellcheck source=tests/spread/tools/retry.sh
  . "$TOOLS_DIR/retry.sh"

  run_sdkcraft whoami

  # Test register and unregister with no uploads.
  run_sdkcraft register test-sdk-register || true
  # TODO: uncomment the line below once the unregister command is implemented.
  # run_sdkcraft unregister test-sdk-register

  # Test register, upload, and release.
  run_sdkcraft pack
  run_sdkcraft register test-sdk-name || true
  sdk_file=$(ls ./*.sdk)
  run_sdkcraft upload "${sdk_file}" --release edge

  # Test standalone release command: re-release the same revision to candidate.
  sdk_name="test-sdk-name"
  # clean to rebuild and get a new binary, otherwise, the store will refuse the upload.
  run_sdkcraft clean
  run_sdkcraft pack
  revision=$(run_sdkcraft upload "${sdk_file}" 2>&1 | grep -oP 'revision \K[0-9]+' | tail -1)
  run_sdkcraft release "${sdk_name}" "${revision}" candidate
  # Verify the channel map table is printed (header must appear).
  run_sdkcraft release "${sdk_name}" "${revision}" stable | grep -q "CHANNEL"
