name: sdkcraft
version: 0.1.6
base: core22
summary: Design and build an SDK for Workshop
description: |
  A tool to design and build SDKs. An SDK can be defined
  as a set of components (parts), interfaces and hooks that SDKcraft will bundle
  together as a single package installable by Workshop.
confinement: classic
grade: devel
license: GPL-3.0-only
compression: lzo

apps:
  sdkcraft:
    command: bin/python3 -m sdkcraft
    environment:
      PYTHONPATH: ${SNAP}/lib/python3.10/dist-packages:${SNAP}/usr/lib/python3/dist-packages:${PYTHONPATH}
  publish:
    environment:
      PATH: ${SNAP}/bin:${PATH}
      PYTHONPATH: ${SNAP}/lib/python3.10/dist-packages:${SNAP}/usr/lib/python3/dist-packages:${PYTHONPATH}
    command: bin/publish.sh
parts:
  sdkcraft-libs:
    plugin: nil
    build-attributes:
      - enable-patchelf
    stage-packages:
      - apt
      - apt-transport-https
      - apt-utils
      - binutils
      - gpg
      - gpgv
      - libpython3-stdlib
      - libpython3.10-stdlib
      - libpython3.10-minimal
      - python3-pip
      - python3-setuptools
      - python3-wheel
      - python3-venv
      - python3-minimal
      - python3-distutils
      - python3-pkg-resources
      - python3.10-minimal
      - python3-apt
  sdkcraft:
    source: .
    plugin: uv
    build-snaps:
      - astral-uv
    build-attributes:
      - enable-patchelf
    build-environment:
      - PARTS_PYTHON_VENV_ARGS: --system-site-packages
    prime:
      - -usr/share/man
      - -usr/share/lintian
      - -usr/share/doc
    after:
      - sdkcraft-libs
    # Override-build here is to circumvent the UVPlugin's buggy build commands:
    # https://github.com/canonical/craft-parts/pull/1003/files
    # Remove override-build when snapcraft latest/stable becomes higher or equal to v8.7.2
    override-build: |
      uv venv --relocatable --allow-existing --python python3 /root/parts/sdkcraft/install
      uv sync --no-dev --no-editable --reinstall
      ln -sf "../usr/bin/python3.10" "../install/bin/python"
  scripts:
    plugin: dump
    source: sdkcraft
    organize:
      "*.sh": bin/
    build-attributes:
      - no-patchelf
  yq:
    plugin: go
    source: https://github.com/mikefarah/yq.git
    source-tag: v4.44.1
    build-snaps:
      - go/latest/stable
    build-environment:
      - CGO_LDFLAGS_ALLOW: ".*"
    override-build: |
      CGO_ENABLED=0  go build -o "${CRAFT_PART_INSTALL}/bin/yq" -ldflags "-s -w" .
