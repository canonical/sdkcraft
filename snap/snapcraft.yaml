name: sdkcraft
version: 0.1.13
base: core24
summary: Design and build SDKs for Workshop
description: |
  A tool to design and build SDKs. An SDK can be defined
  as a set of components (parts), interfaces and hooks that SDKcraft will bundle
  together as a single package installable by Workshop.
confinement: classic
license: GPL-3.0-only
compression: lzo

apps:
  sdkcraft:
    command: bin/python3 -m sdkcraft
    environment:
      PATH: ${SNAP}/bin:${SNAP}/usr/bin:${PATH}
      PYTHONPATH: ${SNAP}/lib/python3.12/dist-packages:${SNAP}/usr/lib/python3/dist-packages:${PYTHONPATH}
  publish:
    environment:
      PATH: ${SNAP}/bin:${PATH}
      PYTHONPATH: ${SNAP}/lib/python3.12/dist-packages:${SNAP}/usr/lib/python3/dist-packages:${PYTHONPATH}
    command: bin/publish.sh
parts:
  sdkcraft-libs:
    plugin: nil
    build-attributes:
      - enable-patchelf
    stage-packages:
      - apt
      - apt-transport-https
      - apt-utils
      - binutils
      - gpg
      - gpgv
      - libpython3-stdlib
      - libpython3.12-stdlib
      - libpython3.12-minimal
      - python3-minimal
      - python3.12-minimal
      - python3-apt
      - zstd
    prime:
      - -usr/share/man
      - -usr/share/lintian
      - -usr/share/doc
    override-build: |
      craftctl default

      $CRAFT_PART_INSTALL/usr/bin/python3 -m compileall -q -j $CRAFT_PARALLEL_BUILD_COUNT $CRAFT_PART_INSTALL/usr/lib
  sdkcraft:
    source: .
    plugin: uv
    build-snaps:
      - astral-uv
    override-build: |
      craftctl default

      # Fix interpreter path for subsequent build commands.
      ln -sf $CRAFT_STAGE/usr/bin/python3 $CRAFT_PART_INSTALL/bin/python
      # Fix erroneous link introduced by craft-parts plugin.
      ln -sf python $CRAFT_PART_INSTALL/bin/python3

      $CRAFT_PART_INSTALL/bin/python -m compileall -q -j $CRAFT_PARALLEL_BUILD_COUNT $CRAFT_PART_INSTALL/lib
    build-attributes:
      - enable-patchelf
    build-environment:
      - PARTS_PYTHON_VENV_ARGS: --system-site-packages
    after:
      - sdkcraft-libs
    override-stage: |
      craftctl default

      # Fix interpreter path for the installed snap.
      ln -sf ../usr/bin/python3 $CRAFT_STAGE/bin/python
  scripts:
    plugin: dump
    source: sdkcraft
    organize:
      "*.sh": bin/
    build-attributes:
      - no-patchelf
  yq:
    plugin: go
    source: https://github.com/mikefarah/yq.git
    source-tag: v4.44.1
    build-snaps:
      - go/latest/stable
    build-environment:
      - CGO_LDFLAGS_ALLOW: ".*"
    override-build: |
      CGO_ENABLED=0  go build -o "${CRAFT_PART_INSTALL}/bin/yq" -ldflags "-s -w" .
