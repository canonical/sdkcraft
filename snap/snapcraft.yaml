name: sdkcraft
version: git
base: core22
summary: Design and build an SDK for Workshop
description: |
  A tool to design and build SDKs. An SDK can be defined
  as a set of components (parts), interfaces and hooks that sdkcraft will bundle
  together as a single package installable by Workshop.
confinement: classic
grade: devel
license: GPL-3.0-only
compression: lzo

apps:
  sdkcraft:
    command: bin/python -m sdkcraft

parts:
  sdkcraft-libs:
    plugin: nil
    build-attributes:
      - enable-patchelf
    stage-packages:
      - apt
      - apt-transport-https
      - apt-utils
      - binutils
      - gpg
      - gpgv
      - libpython3-stdlib
      - libpython3.10-stdlib
      - libpython3.10-minimal
      - python3-pip
      - python3-setuptools
      - python3-wheel
      - python3-venv
      - python3-minimal
      - python3-distutils
      - python3-pkg-resources
      - python3.10-minimal
      - python3-apt
  sdkcraft:
    source: .
    plugin: python
    build-attributes:
      - enable-patchelf
    build-packages:
      - python3.10-venv
      - python3-apt
      - python3-pip-whl
    build-environment:
      - PARTS_PYTHON_VENV_ARGS: --system-site-packages
    override-build: |
      craftctl default
      # Compile all Python files in the source directory to bytecode.
      python3 -m compileall --invalidation-mode checked-hash -j 0 -q $CRAFT_PART_INSTALL
    prime:
      - -usr/share/man
      - -usr/share/lintian
      - -usr/share/doc
    after:
      - sdkcraft-libs
