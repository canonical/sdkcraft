project: sdkcraft

path: /sdkcraft
environment:
  PROJECT_PATH: /sdkcraft
  PATH: /snap/bin:$PROJECT_PATH/tests/tools:$PATH
  CRAFT_DEBUG: 1 # Show exception tracebacks.

include:
  - tests/

backends:
  lxd:
    systems:
      - ubuntu-20.04:
          workers: 2
      - ubuntu-22.04:
          workers: 2
      - ubuntu-24.04:
          workers: 2
debug: |
  journalctl -xe
  journalctl -u snapd.service
prepare: |
  set -e

  mkdir -p /etc/systemd/system/snapd.service.d
  cat <<EOF >/etc/systemd/system/snapd.service.d/override.conf
  # Workaround for https://bugs.launchpad.net/snapd/+bug/2104066
  [Service]
  Environment=SNAPD_STANDBY_WAIT=1m
  EOF
  systemctl daemon-reload
  systemctl restart snapd.service

  snap wait system seed.loaded

  # The /snap directory does not exist in some environments
  [ ! -d /snap ] && ln -s /var/lib/snapd/snap /snap

  # install lxd (previously removing the APT version, if there)
  [ -e /usr/bin/lxd ] && apt-get remove --purge --yes lxd lxd-client lxcfs liblxc1
  snap install lxd

  # Hold snap refreshes for 24h.
  snap set system refresh.hold="$(date --date=tomorrow +%Y-%m-%dT%H:%M:%S%:z)"
  if ! snap watch --last=auto-refresh?; then
      journalctl -xe
  fi
  if ! snap watch --last=install?; then
      journalctl -xe
  fi

  lxd waitready --timeout=60
  lxd init --auto

  install_sdkcraft

suites:
  tests/spread/:
    summary: tests for sdkcraft core functionality
